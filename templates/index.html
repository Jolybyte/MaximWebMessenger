<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#00ff66">
    <title>Maxim Messenger - Вход</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <!-- Font Awesome 6 (Free) - современные иконки -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        /* Дополнительные стили для иконок Font Awesome */
        .auth-header h1 i {
            font-size: 2rem;
            margin-right: 12px;
            vertical-align: middle;
            color: #00ff88;
            text-shadow: 0 0 8px rgba(0,255,136,0.5);
        }
        
        .tab-btn i {
            margin-right: 8px;
            font-size: 0.9rem;
        }
        
        .form-group input {
            padding-left: 44px;
            background-position: 16px center;
            background-repeat: no-repeat;
            background-size: 18px;
        }
        
        .form-group {
            position: relative;
        }
        
        .form-group .field-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #00ff88;
            font-size: 1rem;
            opacity: 0.7;
            pointer-events: none;
            z-index: 2;
        }
        
        .checkbox-label i {
            margin-right: 8px;
            font-size: 0.9rem;
            color: #00ff88;
        }
        
        .btn i {
            margin-right: 8px;
            font-size: 0.9rem;
        }
        
        .avatar-selector .btn-secondary i {
            margin-right: 6px;
        }
        
        @media (max-width: 768px) {
            .form-group .field-icon {
                left: 14px;
                font-size: 0.85rem;
            }
            .form-group input {
                padding-left: 40px;
            }
        }

        /* ============ DARK FRUTIGER AERO ФОН ============ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(ellipse at 20% 30%, #0a1f0a 0%, #030603 100%);
            position: relative;
            overflow-x: hidden;
        }

        /* Анимированная сетка Frutiger */
        .grid-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 100, 0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 100, 0.08) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 1;
            animation: gridFloat 20s linear infinite;
        }

        @keyframes gridFloat {
            0% {
                transform: translateY(0);
            }
            100% {
                transform: translateY(50px);
            }
        }

        /* Плавающие светящиеся сферы */
        .glow-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(60px);
            pointer-events: none;
            z-index: 0;
            opacity: 0.5;
            animation: floatOrb 18s ease-in-out infinite;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(0, 255, 100, 0.4), rgba(0, 100, 50, 0.1));
            top: -150px;
            left: -150px;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(0, 200, 150, 0.3), rgba(0, 80, 60, 0.05));
            bottom: -200px;
            right: -150px;
            animation-delay: -5s;
            animation-duration: 22s;
        }

        .orb-3 {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(100, 255, 150, 0.25), rgba(0, 60, 40, 0.05));
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -10s;
            animation-duration: 15s;
        }

        .orb-4 {
            width: 250px;
            height: 250px;
            background: radial-gradient(circle, rgba(0, 255, 200, 0.3), rgba(0, 100, 80, 0.05));
            bottom: 20%;
            left: 10%;
            animation-delay: -3s;
            animation-duration: 25s;
        }

        @keyframes floatOrb {
            0%, 100% {
                transform: translate(0, 0) scale(1);
            }
            33% {
                transform: translate(30px, -40px) scale(1.05);
            }
            66% {
                transform: translate(-20px, 30px) scale(0.98);
            }
        }

        /* Линии Fresnel / Frutiger эффект */
        .fresnel-lines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                115deg,
                transparent,
                transparent 40px,
                rgba(0, 255, 100, 0.03) 40px,
                rgba(0, 255, 100, 0.06) 45px,
                transparent 50px
            );
            pointer-events: none;
            z-index: 1;
            animation: fresnelMove 12s linear infinite;
        }

        @keyframes fresnelMove {
            0% {
                background-position: 0 0;
            }
            100% {
                background-position: 100px 100px;
            }
        }

        /* Винтажные гранжевые пятна (Frutiger texture) */
        .grain-texture {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 2;
            opacity: 0.3;
        }

        /* Анимированные частицы (дополнительный эффект) */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            background: rgba(0, 255, 120, 0.4);
            border-radius: 50%;
            width: 2px;
            height: 2px;
            animation: particleFloat 8s linear infinite;
        }

        @keyframes particleFloat {
            0% {
                transform: translateY(100vh) scale(1);
                opacity: 0;
            }
            10% {
                opacity: 0.8;
            }
            90% {
                opacity: 0.5;
            }
            100% {
                transform: translateY(-20vh) scale(0.5);
                opacity: 0;
            }
        }

        /* Стили для auth-card поверх фона */
        .auth-container {
            position: relative;
            z-index: 10;
        }

        .auth-card {
            background: rgba(8, 15, 8, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 255, 100, 0.3);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(0, 255, 100, 0.15) inset, 0 0 40px rgba(0, 255, 100, 0.1);
        }

        .auth-card:hover {
            border-color: rgba(0, 255, 100, 0.6);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(0, 255, 100, 0.3) inset;
        }

        /* Стиль для сабмита */
        .btn-primary {
            background: linear-gradient(135deg, #00cc55, #008833);
            box-shadow: 0 4px 15px rgba(0, 200, 80, 0.3);
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #00dd66, #009944);
            transform: translateY(-1px);
        }
    </style>
</head>
<body>
    <!-- Dark Frutiger Aero фоновые элементы -->
    <div class="grid-overlay"></div>
    <div class="fresnel-lines"></div>
    <div class="grain-texture"></div>
    
    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>
    <div class="glow-orb orb-3"></div>
    <div class="glow-orb orb-4"></div>
    
    <div class="particles" id="particles"></div>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>
                    <i class="fas fa-comment-dots"></i> 
                    Maxim Messenger
                </h1>
                <p><i class="fas fa-rocket"></i> Простой и удобный мессенджер</p>
            </div>
            
            <div class="auth-tabs">
                <button class="tab-btn active" data-tab="login">
                    <i class="fas fa-sign-in-alt"></i> Вход
                </button>
                <button class="tab-btn" data-tab="register">
                    <i class="fas fa-user-plus"></i> Регистрация
                </button>
            </div>
            
            <!-- Форма входа -->
            <div id="login-form" class="auth-form active">
                <div class="form-group">
                    <i class="fas fa-user field-icon"></i>
                    <input type="text" id="login-username" placeholder="Имя пользователя" autocomplete="off">
                </div>
                <div class="form-group">
                    <i class="fas fa-lock field-icon"></i>
                    <input type="password" id="login-password" placeholder="Пароль">
                </div>
                <div class="form-group">
                    <label class="checkbox-label">
                        <i class="fas fa-check-circle"></i>
                        <input type="checkbox" id="remember-me" checked> Запомнить меня
                    </label>
                </div>
                <button id="login-btn" class="btn btn-primary">
                    <i class="fas fa-key"></i> Войти
                </button>
            </div>
            
            <!-- Форма регистрации -->
            <div id="register-form" class="auth-form">
                <div class="avatar-selector">
                    <div class="avatar-preview" id="avatar-preview">
                        <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%2300cc66'/%3E%3Ctext x='50' y='70' text-anchor='middle' fill='white' font-size='45'%3E%3C/text%3E%3C/svg%3E" alt="Avatar">
                    </div>
                    <button type="button" id="select-avatar-btn" class="btn-secondary">
                        <i class="fas fa-camera"></i> Выбрать аватар
                    </button>
                    <input type="file" id="avatar-input" accept="image/*" style="display: none;">
                </div>
                <div class="form-group">
                    <i class="fas fa-user-plus field-icon"></i>
                    <input type="text" id="reg-username" placeholder="Имя пользователя" autocomplete="off">
                </div>
                <div class="form-group">
                    <i class="fas fa-lock field-icon"></i>
                    <input type="password" id="reg-password" placeholder="Пароль">
                </div>
                <div class="form-group">
                    <i class="fas fa-shield-alt field-icon"></i>
                    <input type="password" id="reg-confirm-password" placeholder="Подтвердите пароль">
                </div>
                <button id="register-btn" class="btn btn-primary">
                    <i class="fas fa-user-astronaut"></i> Зарегистрироваться
                </button>
            </div>
            
            <div id="error-message" class="error-message">
                <i class="fas fa-exclamation-triangle"></i> <span></span>
            </div>
        </div>
    </div>
    
    <script>
        // Генерация плавающих частиц (Frutiger стиль)
        function createParticles() {
            const container = document.getElementById('particles');
            const particleCount = 60;
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                const size = Math.random() * 3 + 1;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDuration = Math.random() * 10 + 5 + 's';
                particle.style.animationDelay = Math.random() * 10 + 's';
                particle.style.opacity = Math.random() * 0.5 + 0.2;
                particle.style.background = `rgba(0, ${Math.floor(Math.random() * 100 + 100)}, ${Math.floor(Math.random() * 80 + 70)}, 0.5)`;
                container.appendChild(particle);
            }
        }
        
        createParticles();

        let selectedAvatar = null;
        
        function showError(message) {
            const errorDiv = document.getElementById('error-message');
            const span = errorDiv.querySelector('span');
            if (span) span.textContent = message;
            else errorDiv.innerHTML = `<i class="fas fa-exclamation-triangle"></i> ${message}`;
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 3000);
        }
        
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const tab = btn.dataset.tab;
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById(`${tab}-form`).classList.add('active');
                document.getElementById('error-message').style.display = 'none';
            });
        });
        
        const selectAvatarBtn = document.getElementById('select-avatar-btn');
        const avatarInput = document.getElementById('avatar-input');
        const avatarPreview = document.getElementById('avatar-preview');
        
        if (selectAvatarBtn) {
            selectAvatarBtn.addEventListener('click', () => {
                avatarInput.click();
            });
        }
        
        if (avatarInput) {
            avatarInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) {
                    if (file.size > 2 * 1024 * 1024) {
                        showError('Изображение слишком большое. Максимальный размер 2MB');
                        return;
                    }
                    
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        selectedAvatar = e.target.result;
                        avatarPreview.innerHTML = `<img src="${selectedAvatar}" alt="Avatar">`;
                    };
                    reader.readAsDataURL(file);
                }
            });
        }
        
        const registerBtn = document.getElementById('register-btn');
        if (registerBtn) {
            registerBtn.addEventListener('click', async () => {
                const username = document.getElementById('reg-username').value.trim();
                const password = document.getElementById('reg-password').value;
                const confirmPassword = document.getElementById('reg-confirm-password').value;
                
                if (!username || !password) {
                    showError('Заполните все поля');
                    return;
                }
                
                if (password !== confirmPassword) {
                    showError('Пароли не совпадают');
                    return;
                }
                
                if (username.length < 3) {
                    showError('Имя пользователя должно содержать минимум 3 символа');
                    return;
                }
                
                if (password.length < 4) {
                    showError('Пароль должен содержать минимум 4 символа');
                    return;
                }
                
                try {
                    const response = await fetch('/api/register', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            username,
                            password,
                            avatar_base64: selectedAvatar || ''
                        })
                    });
                    
                    const data = await response.json();
                    
                    if (data.success) {
                        window.location.href = '/chat';
                    } else {
                        showError(data.error || 'Ошибка регистрации');
                    }
                } catch (error) {
                    showError('Ошибка соединения с сервером');
                    console.error('Registration error:', error);
                }
            });
        }
        
        const loginBtn = document.getElementById('login-btn');
        if (loginBtn) {
            loginBtn.addEventListener('click', async () => {
                const username = document.getElementById('login-username').value.trim();
                const password = document.getElementById('login-password').value;
                
                if (!username || !password) {
                    showError('Заполните все поля');
                    return;
                }
                
                try {
                    const response = await fetch('/api/login', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({username, password})
                    });
                    
                    const data = await response.json();
                    
                    if (data.success) {
                        window.location.href = '/chat';
                    } else {
                        showError(data.error || 'Неверное имя пользователя или пароль');
                    }
                } catch (error) {
                    showError('Ошибка соединения с сервером');
                    console.error('Login error:', error);
                }
            });
        }
        
        const loginPassword = document.getElementById('login-password');
        if (loginPassword) {
            loginPassword.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') loginBtn.click();
            });
        }
        
        const regConfirm = document.getElementById('reg-confirm-password');
        if (regConfirm) {
            regConfirm.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') registerBtn.click();
            });
        }
        
        async function checkSavedUser() {
            try {
                const response = await fetch('/api/check_session');
                const data = await response.json();
                if (data.authenticated) {
                    window.location.href = '/chat';
                }
            } catch (error) {
                console.error('Session check error:', error);
            }
        }
        
        checkSavedUser();
    </script>
</body>
</html>
