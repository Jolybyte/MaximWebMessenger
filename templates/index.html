<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#4CAF50">
    <title>Maxim Messenger - Вход</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>💬 Maxim Messenger</h1>
                <p>Простой и удобный мессенджер</p>
            </div>
            
            <div class="auth-tabs">
                <button class="tab-btn active" data-tab="login">Вход</button>
                <button class="tab-btn" data-tab="register">Регистрация</button>
            </div>
            
            <!-- Форма входа -->
            <div id="login-form" class="auth-form active">
                <div class="form-group">
                    <input type="text" id="login-username" placeholder="👤 Имя пользователя" autocomplete="off">
                </div>
                <div class="form-group">
                    <input type="password" id="login-password" placeholder="🔒 Пароль">
                </div>
                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="remember-me" checked> Запомнить меня
                    </label>
                </div>
                <button id="login-btn" class="btn btn-primary">🔐 Войти</button>
            </div>
            
            <!-- Форма регистрации -->
            <div id="register-form" class="auth-form">
                <div class="avatar-selector">
                    <div class="avatar-preview" id="avatar-preview">
                        <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%234CAF50'/%3E%3Ctext x='50' y='70' text-anchor='middle' fill='white' font-size='40'%3E👤%3C/text%3E%3C/svg%3E" alt="Avatar">
                    </div>
                    <button type="button" id="select-avatar-btn" class="btn-secondary">📷 Выбрать аватар</button>
                    <input type="file" id="avatar-input" accept="image/*" style="display: none;">
                </div>
                <div class="form-group">
                    <input type="text" id="reg-username" placeholder="👤 Имя пользователя" autocomplete="off">
                </div>
                <div class="form-group">
                    <input type="password" id="reg-password" placeholder="🔒 Пароль">
                </div>
                <div class="form-group">
                    <input type="password" id="reg-confirm-password" placeholder="🔒 Подтвердите пароль">
                </div>
                <button id="register-btn" class="btn btn-primary">🚀 Зарегистрироваться</button>
            </div>
            
            <div id="error-message" class="error-message"></div>
        </div>
    </div>
    
    <script>
        let selectedAvatar = null;
        
        // Переключение между вкладками
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const tab = btn.dataset.tab;
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById(`${tab}-form`).classList.add('active');
                document.getElementById('error-message').style.display = 'none';
            });
        });
        
        // Выбор аватара
        document.getElementById('select-avatar-btn').addEventListener('click', () => {
            document.getElementById('avatar-input').click();
        });
        
        document.getElementById('avatar-input').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                // Проверка размера файла (макс 2MB)
                if (file.size > 2 * 1024 * 1024) {
                    showError('Изображение слишком большое. Максимальный размер 2MB');
                    return;
                }
                
                const reader = new FileReader();
                reader.onload = (e) => {
                    selectedAvatar = e.target.result;
                    document.getElementById('avatar-preview').innerHTML = `<img src="${selectedAvatar}" alt="Avatar">`;
                };
                reader.readAsDataURL(file);
            }
        });
        
        // Регистрация
        document.getElementById('register-btn').addEventListener('click', async () => {
            const username = document.getElementById('reg-username').value.trim();
            const password = document.getElementById('reg-password').value;
            const confirmPassword = document.getElementById('reg-confirm-password').value;
            
            if (!username || !password) {
                showError('Заполните все поля');
                return;
            }
            
            if (password !== confirmPassword) {
                showError('Пароли не совпадают');
                return;
            }
            
            if (username.length < 3) {
                showError('Имя пользователя должно содержать минимум 3 символа');
                return;
            }
            
            if (password.length < 4) {
                showError('Пароль должен содержать минимум 4 символа');
                return;
            }
            
            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        username,
                        password,
                        avatar_base64: selectedAvatar || ''
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    window.location.href = '/chat';
                } else {
                    showError(data.error);
                }
            } catch (error) {
                showError('Ошибка соединения с сервером');
                console.error('Registration error:', error);
            }
        });
        
        // Вход
        document.getElementById('login-btn').addEventListener('click', async () => {
            const username = document.getElementById('login-username').value.trim();
            const password = document.getElementById('login-password').value;
            
            if (!username || !password) {
                showError('Заполните все поля');
                return;
            }
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username, password})
                });
                
                const data = await response.json();
                
                if (data.success) {
                    window.location.href = '/chat';
                } else {
                    showError(data.error);
                }
            } catch (error) {
                showError('Ошибка соединения с сервером');
                console.error('Login error:', error);
            }
        });
        
        function showError(message) {
            const errorDiv = document.getElementById('error-message');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 3000);
        }
        
        // Enter для отправки
        document.getElementById('login-password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') document.getElementById('login-btn').click();
        });
        
        document.getElementById('reg-confirm-password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') document.getElementById('register-btn').click();
        });
        
        // Проверка сохраненного пользователя
        async function checkSavedUser() {
            try {
                const response = await fetch('/api/check_session');
                const data = await response.json();
                if (data.authenticated) {
                    window.location.href = '/chat';
                }
            } catch (error) {
                console.error('Session check error:', error);
            }
        }
        
        // Проверяем сессию при загрузке
        checkSavedUser();
    </script>
</body>
</html>
