<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#00ff66">
    <title>Maxim Messenger - Чат</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <!-- Font Awesome 6 - современные иконки вместо эмодзи -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <!-- Three.js core -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- Эффекты Three.js (Bloom) -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    <style>
        /* Дополнительные стили для иконок Font Awesome в чате */
        .mobile-sidebar-toggle i {
            font-size: 1.3rem;
        }
        
        .chat-header h2 i {
            margin-right: 8px;
            color: #00ff88;
        }
        
        .online-count i {
            margin-right: 6px;
            font-size: 0.75rem;
        }
        
        .attach-btn i, .send-btn i {
            font-size: 1.2rem;
        }
        
        .user-status i {
            margin-right: 4px;
            font-size: 0.7rem;
        }
        
        .status i {
            margin-right: 4px;
            font-size: 0.65rem;
        }
        
        .menu-btn i {
            font-size: 1.2rem;
        }
        
        .close-sidebar-btn i {
            font-size: 1.2rem;
        }
        
        .users-section h3 i {
            margin-right: 8px;
            color: #00ff88;
        }
        
        .btn-secondary i, .btn-danger i {
            margin-right: 8px;
        }
        
        .notification {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .notification i {
            font-size: 1rem;
        }
        
        .typing-indicator i {
            margin-right: 8px;
            animation: pulse 1s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
        
        .status.online i {
            color: #00ff88;
        }
        
        .status.offline i {
            color: #666;
        }
        
        .btn i, .tab-btn i {
            transition: transform 0.1s ease;
        }
        
        .btn:active i, .tab-btn:active i {
            transform: scale(0.95);
        }

        /* Переопределение стилей для sidebar слева */
        .chat-container {
            flex-direction: row;
        }

        .sidebar {
            border-left: none;
            border-right: 1px solid rgba(0, 255, 100, 0.5);
            left: 0;
            right: auto;
        }

        /* Для мобильной версии sidebar выезжает слева */
        @media (max-width: 768px) {
            .sidebar {
                left: -100%;
                right: auto;
                border-right: 1px solid #00ff66;
                border-left: none;
            }
            
            .sidebar.open {
                left: 0;
                right: auto;
            }
            
            .close-sidebar-btn {
                left: auto;
                right: 15px;
            }
        }

        /* Анимация для сообщений */
        .message {
            animation: messageGlide 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        @keyframes messageGlide {
            from {
                opacity: 0;
                transform: translateY(12px) scale(0.98);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <!-- SIDEBAR - теперь слева -->
        <div id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <div class="user-info">
                    <div class="user-avatar">
                        <img id="user-avatar" src="" alt="Avatar">
                    </div>
                    <div class="user-details">
                        <span id="username-display">{{ user.username }}</span>
                        <span class="user-status"><i class="fas fa-circle"></i> онлайн</span>
                    </div>
                    <button class="menu-btn" id="menu-btn">
                        <i class="fas fa-ellipsis-v"></i>
                    </button>
                </div>
                <button id="close-sidebar-btn" class="close-sidebar-btn" aria-label="Закрыть">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            
            <div class="separator"></div>
            
            <div class="users-section">
                <h3><i class="fas fa-users"></i> Участники</h3>
                <div id="users-list" class="users-list"></div>
            </div>
        </div>
        
        <!-- Основная область чата -->
        <div class="chat-area">
            <div class="chat-header">
                <div class="chat-header-left">
                    <button id="mobile-sidebar-toggle" class="mobile-sidebar-toggle" aria-label="Открыть меню участников">
                        <i class="fas fa-bars"></i>
                    </button>
                    <h2><i class="fas fa-comments"></i> Общий чат</h2>
                </div>
                <div class="chat-header-right">
                    <span class="online-count" id="online-count">
                        <i class="fas fa-circle"></i> 0 онлайн
                    </span>
                </div>
            </div>
            
            <div id="messages-container" class="messages-container"></div>
            
            <div class="input-area">
                <button id="attach-btn" class="attach-btn" title="Прикрепить изображение">
                    <i class="fas fa-paperclip"></i>
                </button>
                <textarea id="message-input" placeholder="Напишите сообщение..." rows="1"></textarea>
                <button id="send-btn" class="send-btn">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>
        
        <div id="sidebar-overlay" class="sidebar-overlay"></div>
    </div>
    
    <div id="menu-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <h3><i class="fas fa-user-cog"></i> Меню пользователя</h3>
            <p>Пользователь: <strong id="modal-username"></strong></p>
            <button id="change-avatar-menu" class="btn-secondary">
                <i class="fas fa-camera"></i> Сменить аватарку
            </button>
            <button id="logout-btn" class="btn-secondary">
                <i class="fas fa-sign-out-alt"></i> Выйти
            </button>
            <!-- 
            <button id="delete-account-btn" class="btn-danger">
                <i class="fas fa-trash-alt"></i> Удалить аккаунт
            </button>
            -->
            <button id="close-modal" class="btn-secondary">
                <i class="fas fa-times"></i> Отмена
            </button>
        </div>
    </div>
    
    <div id="image-modal" class="modal" style="display: none;">
        <div class="modal-content image-modal">
            <img id="full-image" src="" alt="Full size">
            <button id="close-image-modal" class="close-btn">
                <i class="fas fa-times"></i>
            </button>
        </div>
    </div>
    
    <!-- Фоновый скрипт -->
    <script src="{{ url_for('static', filename='js/background.js') }}"></script>
    
    <script>
        const socket = io();
        let currentUser = {{ user|tojson }};
        let typingTimeout = null;
        let isTyping = false;
        
        async function loadMessages() {
            try {
                const response = await fetch('/api/messages');
                const data = await response.json();
                if (data.messages) {
                    data.messages.forEach(message => displayMessage(message));
                    scrollToBottom();
                }
            } catch (error) {
                console.error('Error loading messages:', error);
            }
        }
        
        async function loadUsers() {
            try {
                const response = await fetch('/api/users');
                const data = await response.json();
                if (data.users) {
                    updateUsersList(data.users);
                    updateOnlineCount(data.users);
                }
            } catch (error) {
                console.error('Error loading users:', error);
            }
        }
        
        function updateOnlineCount(users) {
            let onlineCount = 0;
            for (const [userId, userData] of Object.entries(users)) {
                if (userData.online && userId !== currentUser.id) {
                    onlineCount++;
                }
            }
            const onlineCountElement = document.getElementById('online-count');
            if (onlineCountElement) {
                onlineCountElement.innerHTML = `<i class="fas fa-circle"></i> ${onlineCount} онлайн`;
            }
        }
        
        function updateUsersList(users) {
            const usersList = document.getElementById('users-list');
            usersList.innerHTML = '';
            
            const currentUserItem = document.createElement('div');
            currentUserItem.className = 'user-item current-user';
            currentUserItem.innerHTML = `
                <div class="user-avatar-small">
                    <img src="${currentUser.avatar_base64 || getDefaultAvatar()}" alt="${currentUser.username}">
                </div>
                <div class="user-info-text">
                    <span class="username">${escapeHtml(currentUser.username)} <i class="fas fa-user-check" style="font-size: 0.7rem; color: #00ff88; margin-left: 4px;"></i> (Вы)</span>
                    <span class="status online"><i class="fas fa-circle"></i> онлайн</span>
                </div>
            `;
            usersList.appendChild(currentUserItem);
            
            for (const [userId, userData] of Object.entries(users)) {
                if (userId !== currentUser.id) {
                    const userItem = document.createElement('div');
                    userItem.className = 'user-item';
                    userItem.innerHTML = `
                        <div class="user-avatar-small">
                            <img src="${userData.avatar_base64 || getDefaultAvatar()}" alt="${userData.username}">
                        </div>
                        <div class="user-info-text">
                            <span class="username">${escapeHtml(userData.username)}</span>
                            <span class="status ${userData.online ? 'online' : 'offline'}">
                                ${userData.online ? '<i class="fas fa-circle"></i> онлайн' : '<i class="fas fa-circle"></i> оффлайн'}
                            </span>
                        </div>
                    `;
                    usersList.appendChild(userItem);
                }
            }
        }
        
        function getDefaultAvatar() {
            return "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%2300cc66'/%3E%3Ctext x='50' y='70' text-anchor='middle' fill='white' font-size='45'%3E%3C/text%3E%3C/svg%3E";
        }
        
        function displayMessage(message) {
            const container = document.getElementById('messages-container');
            const isOwnMessage = message.user_id === currentUser.id;
            
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isOwnMessage ? 'own-message' : 'other-message'}`;
            
            const time = new Date(message.timestamp).toLocaleTimeString('ru-RU', {
                hour: '2-digit',
                minute: '2-digit'
            });
            
            let contentHtml = '';
            
            if (message.image_base64) {
                contentHtml += `<img src="${message.image_base64}" class="message-image" onclick="showFullImage('${message.image_base64}')">`;
            }
            
            if (message.text) {
                contentHtml += `<div class="message-text">${escapeHtml(message.text)}</div>`;
            }
            
            messageDiv.innerHTML = `
                <div class="message-avatar">
                    <img src="${message.avatar_base64 || getDefaultAvatar()}" alt="${message.username}">
                </div>
                <div class="message-content">
                    ${!isOwnMessage ? `<div class="message-sender"><i class="fas fa-user" style="font-size: 0.6rem; margin-right: 4px;"></i>${escapeHtml(message.username)}</div>` : ''}
                    <div class="message-bubble">
                        ${contentHtml}
                        <div class="message-time"><i class="far fa-clock" style="font-size: 0.6rem; margin-right: 4px;"></i>${time}</div>
                    </div>
                </div>
            `;
            
            container.appendChild(messageDiv);
            scrollToBottom();
        }
        
        async function sendMessage() {
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            
            if (!text) return;
            
            socket.emit('send_message', {text});
            input.value = '';
            input.style.height = 'auto';
            
            if (isTyping) {
                socket.emit('typing', {is_typing: false});
                isTyping = false;
                if (typingTimeout) clearTimeout(typingTimeout);
            }
        }
        
        async function sendImage(file) {
            if (file.size > 5 * 1024 * 1024) {
                showNotification('Изображение слишком большое. Максимальный размер 5MB', 'error');
                return;
            }
            
            const reader = new FileReader();
            reader.onload = (e) => {
                socket.emit('send_message', {image_base64: e.target.result});
            };
            reader.readAsDataURL(file);
        }
        
        function scrollToBottom() {
            const container = document.getElementById('messages-container');
            container.scrollTop = container.scrollHeight;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function showFullImage(imageSrc) {
            const modal = document.getElementById('image-modal');
            const fullImage = document.getElementById('full-image');
            fullImage.src = imageSrc;
            modal.style.display = 'flex';
        }
        
        function openSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            sidebar.classList.add('open');
            overlay.classList.add('active');
            document.body.style.overflow = 'hidden';
        }
        
        function closeSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            sidebar.classList.remove('open');
            overlay.classList.remove('active');
            document.body.style.overflow = '';
        }
        
        socket.on('connect', () => {
            console.log('Connected to server');
        });
        
        socket.on('new_message', (message) => {
            displayMessage(message);
        });
        
        socket.on('user_joined', (data) => {
            loadUsers();
            showNotification(`${data.user.username} присоединился к чату`, 'success');
        });
        
        socket.on('user_left', (data) => {
            loadUsers();
        });
        
        socket.on('user_updated', (data) => {
            if (data.user_id === currentUser.id) {
                currentUser = data.user;
                document.getElementById('user-avatar').src = currentUser.avatar_base64 || getDefaultAvatar();
            }
            loadUsers();
        });
        
        socket.on('user_typing', (data) => {
            const typingIndicator = document.getElementById('typing-indicator');
            if (data.is_typing) {
                if (!typingIndicator) {
                    const indicator = document.createElement('div');
                    indicator.id = 'typing-indicator';
                    indicator.className = 'typing-indicator';
                    indicator.innerHTML = `<i class="fas fa-pen-fade"></i> ${data.username} печатает...`;
                    const container = document.getElementById('messages-container');
                    container.appendChild(indicator);
                    scrollToBottom();
                } else if (typingIndicator && !typingIndicator.innerHTML.includes(data.username)) {
                    typingIndicator.innerHTML = `<i class="fas fa-pen-fade"></i> ${data.username} печатает...`;
                }
            } else {
                const indicator = document.getElementById('typing-indicator');
                if (indicator) indicator.remove();
            }
        });
        
        function showNotification(message, type = 'info') {
            const notification = document.createElement('div');
            notification.className = 'notification';
            const icon = type === 'error' ? '<i class="fas fa-exclamation-triangle"></i>' : '<i class="fas fa-info-circle"></i>';
            notification.innerHTML = `${icon} <span>${message}</span>`;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.classList.add('show');
            }, 10);
            
            setTimeout(() => {
                notification.classList.remove('show');
                setTimeout(() => notification.remove(), 300);
            }, 3000);
        }
        
        document.getElementById('send-btn').addEventListener('click', sendMessage);
        
        const mobileSidebarToggle = document.getElementById('mobile-sidebar-toggle');
        if (mobileSidebarToggle) {
            mobileSidebarToggle.addEventListener('click', openSidebar);
        }
        
        const closeSidebarBtn = document.getElementById('close-sidebar-btn');
        if (closeSidebarBtn) {
            closeSidebarBtn.addEventListener('click', closeSidebar);
        }
        
        const sidebarOverlay = document.getElementById('sidebar-overlay');
        if (sidebarOverlay) {
            sidebarOverlay.addEventListener('click', closeSidebar);
        }
        
        document.getElementById('message-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        
        document.getElementById('message-input').addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 100) + 'px';
            
            if (!isTyping && this.value.trim()) {
                isTyping = true;
                socket.emit('typing', {is_typing: true});
            }
            
            if (typingTimeout) clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => {
                if (isTyping) {
                    isTyping = false;
                    socket.emit('typing', {is_typing: false});
                }
            }, 1000);
        });
        
        document.getElementById('attach-btn').addEventListener('click', () => {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (file) sendImage(file);
            };
            input.click();
        });
        
        document.getElementById('menu-btn').addEventListener('click', () => {
            const modal = document.getElementById('menu-modal');
            document.getElementById('modal-username').textContent = currentUser.username;
            modal.style.display = 'flex';
            closeSidebar();
        });
        
        document.getElementById('close-modal').addEventListener('click', () => {
            document.getElementById('menu-modal').style.display = 'none';
        });
        
        document.getElementById('change-avatar-menu').addEventListener('click', () => {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = async (e) => {
                const file = e.target.files[0];
                if (file) {
                    if (file.size > 2 * 1024 * 1024) {
                        showNotification('Изображение слишком большое. Максимальный размер 2MB', 'error');
                        return;
                    }
                    
                    const reader = new FileReader();
                    reader.onload = async (e) => {
                        try {
                            const response = await fetch('/api/update_avatar', {
                                method: 'POST',
                                headers: {'Content-Type': 'application/json'},
                                body: JSON.stringify({avatar_base64: e.target.result})
                            });
                            const data = await response.json();
                            if (data.success) {
                                currentUser.avatar_base64 = e.target.result;
                                document.getElementById('user-avatar').src = currentUser.avatar_base64 || getDefaultAvatar();
                                showNotification('Аватар успешно обновлен!', 'success');
                                document.getElementById('menu-modal').style.display = 'none';
                                loadUsers();
                            }
                        } catch (error) {
                            showNotification('Ошибка при обновлении аватара', 'error');
                        }
                    };
                    reader.readAsDataURL(file);
                }
            };
            input.click();
        });
        
        document.getElementById('logout-btn').addEventListener('click', async () => {
            if (confirm('Вы уверены, что хотите выйти?')) {
                try {
                    await fetch('/api/logout', {method: 'POST'});
                    window.location.href = '/';
                } catch (error) {
                    console.error('Logout error:', error);
                }
            }
        });
        
        document.getElementById('delete-account-btn').addEventListener('click', async () => {
            if (confirm('Вы уверены, что хотите удалить аккаунт?\nВсе ваши сообщения останутся в чате.')) {
                try {
                    const response = await fetch('/api/delete_account', {method: 'POST'});
                    const data = await response.json();
                    if (data.success) {
                        window.location.href = '/';
                    } else {
                        showNotification('Ошибка при удалении аккаунта', 'error');
                    }
                } catch (error) {
                    showNotification('Ошибка при удалении аккаунта', 'error');
                }
            }
        });
        
        document.getElementById('close-image-modal').addEventListener('click', () => {
            document.getElementById('image-modal').style.display = 'none';
        });
        
        document.getElementById('image-modal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('image-modal')) {
                document.getElementById('image-modal').style.display = 'none';
            }
        });
        
        document.getElementById('user-avatar').src = currentUser.avatar_base64 || getDefaultAvatar();
        document.getElementById('username-display').textContent = currentUser.username;
        
        loadMessages();
        loadUsers();
        
        window.addEventListener('beforeunload', () => {
            navigator.sendBeacon('/api/logout');
        });
        
        let touchStartX = 0;
        document.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
        });
        
        document.addEventListener('touchend', (e) => {
            const sidebar = document.getElementById('sidebar');
            if (sidebar.classList.contains('open')) {
                const touchEndX = e.changedTouches[0].clientX;
                const diff = touchEndX - touchStartX;
                if (diff > 50) {
                    closeSidebar();
                }
            }
        });
    </script>
</body>
</html>
